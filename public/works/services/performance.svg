  </defs>
  <rect width="900" height="720" fill="#eef3ef" />
  <g filter="url(#b)">
    <circle cx="220" cy="200" r="285" fill="#c7e0cf" />
    <circle cx="710" cy="535" r="320" fill="#d8e6d1" />
    <circle cx="650" cy="155" r="205" fill="#c6ddd8" />
    <circle cx="330" cy="615" r="200" fill="#dfeadb" />
  </g>
  <rect width="900" height="720" filter="url(#g)" />
